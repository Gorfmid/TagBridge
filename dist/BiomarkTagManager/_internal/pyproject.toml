[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "biomark-tag-manager"
version = "1.0.0"
description = "Biomark Tag Manager — download and export tags from BioLogic portals"
requires-python = ">=3.10"
dependencies = [
    "PySide6>=6.6.0",
    "requests>=2.31.0",
    "keyring>=25.0.0",
]

[project.scripts]
biomark-tag-manager = "customer_tag_downloader.ui.main_window:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["customer_tag_downloader*"]
